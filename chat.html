<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Messaging Profile</title>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <style>
            :root {
                --streak-color: #2196f3; /* Default Blue theme for 71-100 */
            }

            /* --- STRUCTURE & LAYOUT --- */
            body {
                background-color: #f0f0f0;
                font-family: Arial, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
            }

            .phone-container {
                width: 380px;
                height: 800px;
                background: linear-gradient(
                    to right,
                    #90cbf9 0%,
                    #90cbf9 4%,
                    #e8f4fd 10%,
                    #ffffff 15%,
                    #ffffff 85%,
                    #e8f4fd 90%,
                    #90cbf9 96%,
                    #90cbf9 100%
                );
                position: relative;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                border: 4px solid var(--streak-color);
                border-radius: 12px;
                transition: border-color 0.3s ease;
            }

            /* --- HEADER ACTIONS --- */
            .header {
                padding: 30px 20px 10px;
                position: relative;
                z-index: 2;
            }

            .header-top {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 15px;
            }

            .back-btn,
            .control-btn {
                position: relative;
                z-index: 10;
                background-color: #333;
                color: white;
                border: none;
                padding: 8px 14px;
                border-radius: 8px;
                font-size: 14px;
                cursor: pointer;
                text-decoration: none;
            }

            .back-btn:hover,
            .control-btn:hover {
                background-color: #111;
            }

            .hangout-name {
                font-size: 18px;
                font-weight: bold;
                color: #111;
                margin: 0;
                text-align: center;
                flex-grow: 1;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                padding: 0 10px;
            }

            .header-text h2 {
                margin: 0;
                font-size: 22px;
                font-weight: bold;
                color: var(--streak-color);
                transition: color 0.3s ease;
            }

            .header-text h3 {
                margin: 5px 0 0;
                font-size: 18px;
                font-weight: normal;
                color: #444;
            }

            /* --- DYNAMIC STREAK FLAMES --- */
            .circles {
                position: absolute;
                top: -20px;
                right: -20px;
                z-index: 1;
                pointer-events: none;
            }

            .circle {
                border-radius: 50%;
                position: absolute;
                background-color: var(--streak-color);
                transition: background-color 0.3s ease;
                pointer-events: none;
            }

            .circle-1 {
                width: 120px;
                height: 120px;
                top: 30px;
                right: 30px;
                opacity: 0.3;
            }
            .circle-2 {
                width: 100px;
                height: 100px;
                top: 15px;
                right: 25px;
                opacity: 0.6;
            }
            .circle-3 {
                width: 80px;
                height: 80px;
                top: 0;
                right: 15px;
                opacity: 1;
            }

            /* --- CONTROL MODAL OVERLAY --- */
            .modal-overlay {
                display: none;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 100;
                justify-content: center;
                align-items: center;
            }

            .modal-content {
                background: white;
                padding: 24px;
                border-radius: 12px;
                width: 80%;
                display: flex;
                flex-direction: column;
                gap: 12px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            }

            .modal-content h3 {
                margin: 0 0 5px 0;
                font-size: 18px;
            }
            .modal-content label {
                font-size: 14px;
                font-weight: 600;
                color: #444;
            }
            .modal-content input {
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 8px;
                font-size: 15px;
                outline: none;
            }

            .modal-content button {
                background: #111;
                color: white;
                padding: 12px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 15px;
                font-weight: bold;
                margin-top: 8px;
            }

            /* --- CHAT TIMELINE --- */
            .chat-box {
                flex: 1;
                padding: 20px;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .message-wrapper {
                display: flex;
                flex-direction: column;
                max-width: 75%;
            }

            .message-wrapper.right {
                align-self: flex-end;
                align-items: flex-end;
            }

            .message-wrapper.left {
                align-self: flex-start;
                align-items: flex-start;
            }

            .bubble {
                padding: 12px 18px;
                border-radius: 20px;
                font-size: 16px;
                line-height: 1.4;
                position: relative;
                color: #111;
            }

            .bubble::after {
                content: '';
                position: absolute;
                bottom: -10px;
                width: 30px;
                height: 30px;
                border-radius: 50%;
                z-index: -1;
            }

            .right .bubble::after {
                right: 0;
            }
            .left .bubble::after {
                left: 0;
            }

            .bg-blue {
                background-color: #bce0fb;
            }
            .bg-blue::after {
                background-color: #bce0fb;
            }

            .subtext {
                font-size: 11px;
                margin-top: 6px;
                color: #444;
                white-space: pre-line;
                line-height: 1.3;
            }
            .right .subtext {
                text-align: right;
            }
            .left .subtext {
                text-align: left;
            }

            /* --- FOOTER UTILITIES --- */
            .footer {
                padding: 15px 20px;
                display: flex;
                flex-direction: column;
                gap: 10px;
                align-items: center;
                background: transparent;
            }

            .input-field {
                width: 90%;
                padding: 12px;
                border-radius: 20px;
                border: 1px solid #ccc;
                font-size: 16px;
                outline: none;
                background: #fff;
            }

            .send-btn {
                background-color: #bce0fb;
                color: #111;
                border: none;
                padding: 10px 40px;
                border-radius: 30px;
                font-size: 18px;
                cursor: pointer;
                width: 180px;
            }

            .send-btn:hover {
                background-color: #a4d2f5;
            }

            /* --- NAVIGATION MANIFEST --- */
            .bottom-nav {
                height: 70px;
                background-color: #ffffff;
                display: flex;
                justify-content: space-around;
                align-items: center;
                border-top: 1px solid #e0e0e0;
            }

            .nav-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-decoration: none;
                color: #8e8e93;
                font-size: 12px;
                gap: 4px;
                width: 20%;
            }

            .nav-icon {
                width: 26px;
                height: 26px;
                fill: currentColor;
            }
            .nav-item.active {
                color: #111111;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="phone-container">
            <div class="modal-overlay" id="control-modal">
                <div class="modal-content">
                    <h3>Admin Controls</h3>
                    <label for="admin-streak-input">Streak Number:</label>
                    <input
                        type="number"
                        id="admin-streak-input"
                        value="100"
                        min="0"
                    />

                    <label for="admin-title-input">Streak Title:</label>
                    <input
                        type="text"
                        id="admin-title-input"
                        value="Socializer"
                    />

                    <button onclick="saveControlSettings()">
                        Save & Close
                    </button>
                </div>
            </div>

            <div class="header">
                <div class="header-top">
                    <a id="back-btn" href="index.html" class="back-btn">Back</a>
                    <h1 class="hangout-name" id="display-hangout-name">
                        Loading...
                    </h1>
                    <button class="control-btn" onclick="openControlMenu()">
                        Control
                    </button>
                </div>
                <div class="header-text">
                    <h2 id="display-streak-num">Your STREAK 100</h2>
                    <h3 id="display-streak-title">Title: Socializer</h3>
                </div>
                <div class="circles">
                    <div class="circle circle-1"></div>
                    <div class="circle circle-2"></div>
                    <div class="circle circle-3"></div>
                </div>
            </div>

            <div class="chat-box" id="chat-box"></div>

            <div class="footer">
                <input
                    type="text"
                    id="message-input"
                    class="input-field"
                    placeholder="Type a message..."
                />
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>

            <div class="bottom-nav">
                <a href="index.html" class="nav-item">
                    <svg viewBox="0 0 24 24" class="nav-icon">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                    </svg>
                    <span>Home</span>
                </a>
                <a href="activities.html" class="nav-item">
                    <svg viewBox="0 0 24 24" class="nav-icon">
                        <path
                            d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
                        />
                    </svg>
                    <span>Activities</span>
                </a>
                <a href="profile.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" class="nav-icon">
                        <path
                            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
                        />
                    </svg>
                    <span>Profile</span>
                </a>
                <a href="calendar.html" class="nav-item">
                    <svg viewBox="0 0 24 24" class="nav-icon">
                        <path
                            d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"
                        />
                    </svg>
                    <span>Calendar</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <svg viewBox="0 0 24 24" class="nav-icon">
                        <path
                            d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
                        />
                    </svg>
                    <span>Settings</span>
                </a>
            </div>
        </div>

        <script>
            /* --- 1. INITIALIZE SUPABASE INSTANCE --- */
            const SUPABASE_URL = 'https://culmoystfpiyiudtfpzw.supabase.co';
            const SUPABASE_ANON_KEY =
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1bG1veXN0ZnBpeWl1ZHRmcHp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDU2NzIsImV4cCI6MjA5OTI4MTY3Mn0.JedwAdBLb23BUc4Xecs_UXh01Jo6cxsaHw55PSQIe80';

            // FIXED: Renamed local instance to 'supabaseClient' to prevent naming conflicts with global script object
            const supabaseClient = supabase.createClient(
                SUPABASE_URL,
                SUPABASE_ANON_KEY,
            );

            /* --- 2. AUTOMATION ROUTING & LINK HANDLING --- */
            const urlParams = new URLSearchParams(window.location.search);
            const hangoutId = urlParams.get('id');

            // Connect back button
            const backBtn = document.getElementById('back-btn');
            if (hangoutId) {
                backBtn.href = `hangouthome.html?id=${hangoutId}`;
            } else {
                backBtn.href = 'index.html';
            }

            // Pull active hangout title from database table
            async function fetchHangoutTitle() {
                const titleElement = document.getElementById(
                    'display-hangout-name',
                );
                if (!hangoutId) {
                    titleElement.textContent = 'General Chat Room';
                    return;
                }

                const { data, error } = await supabaseClient
                    .from('hangouts')
                    .select('hangout_name')
                    .eq('id', hangoutId)
                    .single();

                if (error) {
                    console.error('Error fetching hangout name:', error);
                    titleElement.textContent = 'Chat Log';
                } else if (data) {
                    titleElement.textContent = data.hangout_name;
                }
            }

            /* --- 3. RUNTIME STATE CONFIGURATION --- */
            let currentStreak = 100;
            let currentTitle = 'Socializer';

            /* --- 4. COLOR SCALE MANAGEMENT LOGIC --- */
            function getStreakColor(streak) {
                if (streak === 0) return '#9e9e9e'; // Gray
                if (streak >= 1 && streak <= 25) return '#4caf50'; // Green
                if (streak >= 26 && streak <= 40) return '#ffeb3b'; // Yellow
                if (streak >= 41 && streak <= 50) return '#ff9800'; // Orange
                if (streak >= 51 && streak <= 70) return '#f44336'; // Red
                if (streak >= 71 && streak <= 100) return '#2196f3'; // Blue
                if (streak >= 101) return '#9c27b0'; // Purple
                return '#9e9e9e';
            }

            function updateUIThemes() {
                document.getElementById('display-streak-num').innerText =
                    `Your STREAK ${currentStreak}`;
                document.getElementById('display-streak-title').innerText =
                    `Title: ${currentTitle}`;

                const targetedHex = getStreakColor(currentStreak);
                document.documentElement.style.setProperty(
                    '--streak-color',
                    targetedHex,
                );
            }

            /* --- 5. CONTROL DRAWER MECHANICS --- */
            const modal = document.getElementById('control-modal');

            function openControlMenu() {
                document.getElementById('admin-streak-input').value =
                    currentStreak;
                document.getElementById('admin-title-input').value =
                    currentTitle;
                modal.style.display = 'flex';
            }

            function saveControlSettings() {
                currentStreak =
                    parseInt(
                        document.getElementById('admin-streak-input').value,
                    ) || 0;
                currentTitle =
                    document.getElementById('admin-title-input').value ||
                    'Unknown';

                updateUIThemes();
                modal.style.display = 'none';
                renderMessages();
            }

            /* --- 6. STORAGE PERSISTENCE --- */
            const storageKeyName = hangoutId
                ? `chatMessages_${hangoutId}`
                : 'chatMessages_standalone';

            function loadMessages() {
                let data = localStorage.getItem(storageKeyName);
                return data ? JSON.parse(data) : [];
            }

            function renderMessages() {
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = '';
                const messages = loadMessages();

                messages.forEach((msg) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = `message-wrapper ${msg.align}`;

                    const bubble = document.createElement('div');
                    bubble.className = `bubble bg-blue`;
                    bubble.textContent = msg.text;

                    const subtext = document.createElement('div');
                    subtext.className = 'subtext';
                    subtext.innerText = msg.streak;

                    wrapper.appendChild(bubble);
                    wrapper.appendChild(subtext);
                    chatBox.appendChild(wrapper);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            function sendMessage() {
                const inputField = document.getElementById('message-input');
                const newText = inputField.value.trim();
                if (newText === '') return;

                const newMessage = {
                    text: newText,
                    streak: `STREAK ${currentStreak}\nTitle: ${currentTitle}`,
                    align: 'right',
                };

                const messages = loadMessages();
                messages.push(newMessage);
                localStorage.setItem(storageKeyName, JSON.stringify(messages));

                inputField.value = '';
                renderMessages();
            }

            document
                .getElementById('message-input')
                .addEventListener('keypress', function (event) {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        sendMessage();
                    }
                });

            /* --- 7. INITIALIZATION SYSTEM --- */
            fetchHangoutTitle();
            updateUIThemes();
            renderMessages();
        </script>
    </body>
</html>
