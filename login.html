<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <title>LockdSync — Log In</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                font-family: 'Inter', sans-serif;
            }
        </style>
    </head>
    <body
        class="bg-[#fafafa] min-h-screen flex flex-col items-center justify-center text-gray-900 antialiased px-6 py-10"
    >
        <div class="w-full max-w-[380px] mx-auto">
            <div class="text-center mb-8">
                <div
                    class="w-14 h-14 mx-auto mb-4 rounded-2xl bg-[#2E2E2E] flex items-center justify-center"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                        stroke="white"
                        class="w-7 h-7"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"
                        />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-black">LockdSync</h1>
                <p id="mode-subtitle" class="text-sm text-gray-500 mt-1">
                    Welcome back — log in to sync up.
                </p>
            </div>

            <div
                class="bg-white border border-gray-200 rounded-3xl p-6 shadow-sm space-y-5"
            >
                <button
                    id="google-btn"
                    class="w-full flex items-center justify-center gap-3 border border-gray-300 rounded-xl py-3 text-sm font-medium text-gray-800 hover:bg-gray-50 transition"
                >
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path
                            fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1Z"
                        />
                        <path
                            fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23Z"
                        />
                        <path
                            fill="#FBBC05"
                            d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84Z"
                        />
                        <path
                            fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38Z"
                        />
                    </svg>
                    Continue with Google
                </button>
                <div class="flex items-center gap-3">
                    <div class="h-px flex-1 bg-gray-200"></div>
                    <span class="text-xs text-gray-400">or</span>
                    <div class="h-px flex-1 bg-gray-200"></div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2"
                        >Email</label
                    >
                    <input
                        id="email"
                        type="email"
                        placeholder="you@gmail.com"
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition"
                    />
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2"
                        >Password</label
                    >
                    <input
                        id="password"
                        type="password"
                        placeholder="••••••••"
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition"
                    />
                </div>

                <div id="signup-fields" class="hidden space-y-5">
                    <div>
                        <label
                            class="block text-sm font-medium text-gray-700 mb-2"
                            >Create Username</label
                        >
                        <input
                            id="username"
                            type="text"
                            placeholder="e.g. socializer_sam"
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition"
                        />
                    </div>
                    <div>
                        <label
                            class="block text-sm font-medium text-gray-700 mb-2"
                            >Profile Key</label
                        >
                        <div class="flex gap-2">
                            <input
                                id="profile-key"
                                type="text"
                                readonly
                                class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 text-gray-700 font-mono tracking-wider"
                            />
                            <button
                                id="regen-key"
                                type="button"
                                class="shrink-0 px-4 rounded-xl border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50 transition"
                                title="Generate a new key"
                            >
                                New
                            </button>
                        </div>
                        <p class="text-xs text-gray-400 mt-1.5">
                            Share this key so friends can add you to a hangout.
                        </p>
                    </div>
                </div>
                <p id="error-msg" class="hidden text-sm text-red-600"></p>

                <button
                    id="submit-btn"
                    class="w-full bg-[#2E2E2E] hover:bg-black transition text-white rounded-xl py-3 text-sm font-semibold"
                >
                    Log In
                </button>
            </div>

            <p class="text-center text-sm text-gray-500 mt-6">
                <span id="toggle-text">Don't have an account?</span>
                <button
                    id="toggle-btn"
                    class="font-semibold text-black underline ml-1"
                >
                    Sign up
                </button>
            </p>
        </div>

        <script>
            // ---- Mock auth (UI only, stored in localStorage) ----
            var isSignup = false;
            var subtitle = document.getElementById('mode-subtitle');
            var signupFields = document.getElementById('signup-fields');
            var submitBtn = document.getElementById('submit-btn');
            var toggleText = document.getElementById('toggle-text');
            var toggleBtn = document.getElementById('toggle-btn');
            var errorMsg = document.getElementById('error-msg');
            var keyInput = document.getElementById('profile-key');

            function generateKey() {
                var chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
                var out = '';
                for (var i = 0; i < 8; i++) {
                    out += chars.charAt(
                        Math.floor(Math.random() * chars.length),
                    );
                }
                return out.slice(0, 4) + '-' + out.slice(4);
            }

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
            }

            function clearError() {
                errorMsg.classList.add('hidden');
            }

            function setMode(signup) {
                isSignup = signup;
                clearError();
                if (signup) {
                    subtitle.textContent =
                        'Create your account to get started.';
                    signupFields.classList.remove('hidden');
                    submitBtn.textContent = 'Create Account';
                    toggleText.textContent = 'Already have an account?';
                    toggleBtn.textContent = 'Log in';
                    keyInput.value = generateKey();
                } else {
                    subtitle.textContent = 'Welcome back — log in to sync up.';
                    signupFields.classList.add('hidden');
                    submitBtn.textContent = 'Log In';
                    toggleText.textContent = "Don't have an account?";
                    toggleBtn.textContent = 'Sign up';
                }
            }

            toggleBtn.addEventListener('click', function () {
                setMode(!isSignup);
            });

            document
                .getElementById('regen-key')
                .addEventListener('click', function () {
                    keyInput.value = generateKey();
                });

            function saveSessionAndGo(user) {
                localStorage.setItem('lockdsync_user', JSON.stringify(user));
                window.location.href = 'index.html';
            }

            document
                .getElementById('google-btn')
                .addEventListener('click', function () {
                    // Mock Google login
                    saveSessionAndGo({
                        email: 'you@gmail.com',
                        username: 'You',
                        profileKey: generateKey(),
                        provider: 'google',
                    });
                });

            submitBtn.addEventListener('click', function () {
                clearError();
                var email = document.getElementById('email').value.trim();
                var password = document.getElementById('password').value.trim();
                if (!email || !password) {
                    showError('Please enter your email and password.');
                    return;
                }
                if (isSignup) {
                    var username = document
                        .getElementById('username')
                        .value.trim();
                    if (!username) {
                        showError('Please create a username.');
                        return;
                    }
                    saveSessionAndGo({
                        email: email,
                        username: username,
                        profileKey: keyInput.value,
                        provider: 'email',
                    });
                } else {
                    // Mock login — reuse stored username if present, else derive from email
                    var existing = null;
                    try {
                        existing = JSON.parse(
                            localStorage.getItem('lockdsync_user'),
                        );
                    } catch (e) {}
                    saveSessionAndGo({
                        email: email,
                        username:
                            existing && existing.email === email
                                ? existing.username
                                : email.split('@')[0],
                        profileKey:
                            existing && existing.email === email
                                ? existing.profileKey
                                : generateKey(),
                        provider: 'email',
                    });
                }
            });

            // Init
            setMode(false);
        </script>
    </body>
</html>
