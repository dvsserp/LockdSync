<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>LockdSync — Log In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#fafafa] min-h-screen flex flex-col justify-center items-center px-4 text-gray-900 antialiased">
    
    <div class="w-full max-w-md">
        <!-- Back Button -->
        <a href="landingpage.html" class="inline-flex items-center text-sm font-medium text-gray-400 hover:text-black transition mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 mr-1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
            Back to Waitlist
        </a>

        <div class="bg-white rounded-3xl border border-gray-100 p-8 shadow-md">
            
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-12 h-12 bg-[#2E2E2E] rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="white" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-black">LockdSync</h1>
                <p id="mode-subtitle" class="text-sm text-gray-400 mt-1">Sync plans, lock down schedules.</p>
            </div>

            <!-- Tabs -->
            <div class="flex bg-gray-100 p-1 rounded-xl mb-6">
                <button id="tab-login" onclick="setMode('login')" class="flex-1 py-2 text-sm font-semibold rounded-lg text-black bg-white shadow-sm transition-all">Log In</button>
                <button id="tab-signup" onclick="setMode('signup')" class="flex-1 py-2 text-sm font-medium rounded-lg text-gray-500 hover:text-black transition-all">Register</button>
            </div>

            <!-- Auth Form -->
            <form id="auth-form" class="space-y-4">
                
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Username</label>
                    <input id="username" type="text" placeholder="e.g. socializer_sam" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-black focus:ring-1 focus:ring-black focus:outline-none transition bg-gray-50/50" />
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Password (Profile Key)</label>
                    <input id="password" type="password" placeholder="••••••••" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-black focus:ring-1 focus:ring-black focus:outline-none transition bg-gray-50/50" />
                </div>

                <!-- Generated Key Notice (Only shows on Register) -->
                <div id="key-notice" class="hidden text-[11px] text-amber-600 leading-relaxed bg-amber-50 p-2.5 rounded-lg border border-amber-100 mt-2">
                    ℹ️ Create a secure password above. This acts as your Profile Key!
                </div>
                
                <p id="error-msg" class="hidden text-sm text-red-600 text-center font-medium mt-2"></p>

                <button type="submit" id="submit-btn" class="w-full bg-[#2E2E2E] hover:bg-black text-white font-bold py-3.5 px-4 rounded-xl transition duration-150 shadow-md mt-6">
                    Log In
                </button>
            </form>
        </div>
    </div>

    <!-- Supabase CDN and Global App logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>

    <script>
        let isSignup = false;
        
        // Auto-redirect if already logged in
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'index.html';
        });

        // Tab Switching Logic
        function setMode(mode) {
            isSignup = (mode === 'signup');
            document.getElementById('error-msg').classList.add('hidden');
            
            const tabLogin = document.getElementById('tab-login');
            const tabSignup = document.getElementById('tab-signup');
            const submitBtn = document.getElementById('submit-btn');
            const subtitle = document.getElementById('mode-subtitle');
            const keyNotice = document.getElementById('key-notice');

            if (isSignup) {
                tabSignup.className = 'flex-1 py-2 text-sm font-semibold rounded-lg text-black bg-white shadow-sm transition-all';
                tabLogin.className = 'flex-1 py-2 text-sm font-medium rounded-lg text-gray-500 hover:text-black transition-all';
                submitBtn.textContent = 'Create Profile';
                subtitle.textContent = 'Claim your username to get started.';
                keyNotice.classList.remove('hidden');
            } else {
                tabLogin.className = 'flex-1 py-2 text-sm font-semibold rounded-lg text-black bg-white shadow-sm transition-all';
                tabSignup.className = 'flex-1 py-2 text-sm font-medium rounded-lg text-gray-500 hover:text-black transition-all';
                submitBtn.textContent = 'Log In';
                subtitle.textContent = 'Sync plans, lock down schedules.';
                keyNotice.classList.add('hidden');
            }
        }

        // Handle the Form Submission (The Fake Email Trick)
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Please wait...';
            errorMsg.classList.add('hidden');

            // 1. Grab the raw username and password
            const rawUsername = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();

            // 2. The Trick: Format it as a fake email so Supabase accepts it!
            const fakeEmail = `${rawUsername}@lockdsync.local`;

            if (isSignup) {
                // Register with Supabase
                const { data, error } = await supabase.auth.signUp({
                    email: fakeEmail,
                    password: password,
                    options: {
                        data: {
                            username: rawUsername // Save the real username to the database
                        }
                    }
                });

                if (error) {
                    errorMsg.textContent = error.message;
                    errorMsg.classList.remove('hidden');
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                // Log In with Supabase
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: fakeEmail,
                    password: password
                });

                if (error) {
                    errorMsg.textContent = "Invalid Username or Password.";
                    errorMsg.classList.remove('hidden');
                } else {
                    window.location.href = 'index.html';
                }
            }
            
            submitBtn.disabled = false;
            submitBtn.textContent = isSignup ? 'Create Profile' : 'Log In';
        });

        // Initialize on Login tab
        setMode('login');
    </script>
</body>
</html>
