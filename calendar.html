<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calendar</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                font-family: 'Inter', sans-serif;
                background-color: #f4f4f4;
            }
        </style>
    </head>
    <body class="flex justify-center min-h-screen">
        <div
            class="w-full max-w-[400px] min-h-screen flex flex-col bg-white shadow-md"
        >
            <div class="flex-1 pt-10 overflow-y-auto pb-6">
                <h1 class="text-[#a8a8a8] text-lg font-medium mb-4 px-6">
                    Calendar
                </h1>

                <div class="bg-white px-6 pt-2 pb-10">
                    <div class="border border-gray-200 rounded-[20px] p-5 mb-6">
                        <div
                            class="flex justify-between items-center mb-6 px-1"
                        >
                            <button
                                class="text-gray-800 p-1 hover:bg-gray-100 rounded-full"
                            >
                                <svg
                                    class="w-4 h-4"
                                    fill="none"
                                    stroke="currentColor"
                                    viewBox="0 0 24 24"
                                    stroke-width="2.5"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M15 19l-7-7 7-7"
                                    ></path>
                                </svg>
                            </button>

                            <div class="flex gap-2">
                                <div
                                    class="border border-gray-300 rounded-md px-3 py-1 flex items-center gap-2 text-[15px] text-gray-800 cursor-pointer hover:bg-gray-50"
                                >
                                    Jul
                                    <svg
                                        class="w-3 h-3 text-gray-600"
                                        fill="none"
                                        stroke="currentColor"
                                        viewBox="0 0 24 24"
                                        stroke-width="2.5"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M19 9l-7 7-7-7"
                                        ></path>
                                    </svg>
                                </div>
                                <div
                                    class="border border-gray-300 rounded-md px-3 py-1 flex items-center gap-2 text-[15px] text-gray-800 cursor-pointer hover:bg-gray-50"
                                >
                                    2026
                                    <svg
                                        class="w-3 h-3 text-gray-600"
                                        fill="none"
                                        stroke="currentColor"
                                        viewBox="0 0 24 24"
                                        stroke-width="2.5"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M19 9l-7 7-7-7"
                                        ></path>
                                    </svg>
                                </div>
                            </div>

                            <button
                                class="text-gray-800 p-1 hover:bg-gray-100 rounded-full"
                            >
                                <svg
                                    class="w-4 h-4"
                                    fill="none"
                                    stroke="currentColor"
                                    viewBox="0 0 24 24"
                                    stroke-width="2.5"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M9 5l7 7-7 7"
                                    ></path>
                                </svg>
                            </button>
                        </div>

                        <div
                            class="grid grid-cols-7 text-center text-[12px] text-gray-400 mb-4"
                        >
                            <div>Su</div>
                            <div>Mo</div>
                            <div>Tu</div>
                            <div>We</div>
                            <div>Th</div>
                            <div>Fr</div>
                            <div>Sa</div>
                        </div>

                        <div
                            id="calendar-grid"
                            class="grid grid-cols-7 text-center text-[15px] text-gray-700 gap-y-4 items-center"
                        ></div>
                    </div>

                    <div
                        id="day-details-container"
                        class="border border-gray-200 rounded-[20px] p-5 mb-6 bg-white hidden"
                    >
                        <h2
                            id="selected-day-heading"
                            class="text-gray-800 text-base font-semibold mb-4"
                        >
                            July 11th 2026 Schedule
                        </h2>
                        <div id="day-activities-list" class="space-y-4"></div>
                    </div>

                    <div
                        class="border border-gray-100 rounded-[15px] p-4 bg-gray-50 mb-6"
                    >
                        <h2
                            class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3"
                        >
                            Quick Schedule Input
                        </h2>
                        <div class="space-y-3">
                            <div class="grid grid-cols-2 gap-2">
                                <input
                                    id="form-day"
                                    type="number"
                                    min="1"
                                    max="31"
                                    placeholder="Day (e.g. 11)"
                                    class="border border-gray-300 rounded p-1.5 text-xs bg-white focus:outline-none focus:ring-1 focus:ring-gray-400"
                                />
                                <select
                                    id="form-status"
                                    class="border border-gray-300 rounded p-1.5 text-xs bg-white focus:outline-none focus:ring-1 focus:ring-gray-400"
                                >
                                    <option value="FREE">Free (Green)</option>
                                    <option value="FREE_NO_SHOW">
                                        Free - No Show (Gray)
                                    </option>
                                    <option value="NOT_AVAILABLE">
                                        Not Available (Red)
                                    </option>
                                </select>
                            </div>
                            <input
                                id="form-title"
                                type="text"
                                placeholder="Activity Title (e.g., Doctor Appointment)"
                                class="w-full border border-gray-300 rounded p-1.5 text-xs bg-white focus:outline-none focus:ring-1 focus:ring-gray-400"
                            />
                            <button
                                onclick="addUserEvent()"
                                class="w-full bg-neutral-800 hover:bg-neutral-900 text-white text-xs py-1.5 rounded font-medium transition-colors"
                            >
                                Save Plan Entry
                            </button>
                        </div>
                    </div>

                    <div class="px-2 space-y-4">
                        <div class="flex items-center gap-4">
                            <div
                                class="w-[30px] h-[30px] bg-[#f5c6c6] shrink-0 rounded-sm"
                            ></div>
                            <div class="text-[13px] text-gray-700 leading-snug">
                                Not Available / Occupied System Status (Grade F)
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div
                                class="w-[30px] h-[30px] bg-[#bbcd84] shrink-0 rounded-sm"
                            ></div>
                            <div class="text-[13px] text-gray-700 leading-snug">
                                Available / Free Window Active (Grade A+)
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div
                                class="w-[30px] h-[30px] bg-[#d1d5db] shrink-0 rounded-sm"
                            ></div>
                            <div class="text-[13px] text-gray-700 leading-snug">
                                Marked Free but didn't show up (Grade C-)
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <nav
                class="border-t border-gray-200 bg-white shrink-0 sticky bottom-0 z-20 pb-safe shadow-[0_-2px_10px_rgba(0,0,0,0.03)]"
            >
                <ul
                    class="mx-auto flex w-full items-center justify-between px-6 py-3"
                >
                    <li>
                        <a

                            class="flex flex-col items-center text-[10px] font-medium text-gray-400"
                            ><svg

                                fill="none"
                                viewBox="0 0 24 24"
                                stroke-width="1.5"
                                stroke="currentColor"
                                class="w-6 h-6 mb-1"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"
                                /></svg
                            ><span>Home</span></a
                        >
                    </li>
                    <li>
                        <a
                            href="activities.html"
                            class="flex flex-col items-center text-[10px] font-medium text-gray-400"
                            ><svg
                                xmlns="http://www.w3.org/2000/svg"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke-width="1.5"
                                stroke="currentColor"
                                class="w-6 h-6 mb-1"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"
                                /></svg
                            ><span>Activities</span></a
                        >
                    </li>
                    <li>
                        <a
                            href="profile.html"
                            class="flex flex-col items-center text-[10px] font-medium text-gray-400"
                            ><svg
                                xmlns="http://www.w3.org/2000/svg"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke-width="1.5"
                                stroke="currentColor"
                                class="w-6 h-6 mb-1"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
                                /></svg
                            ><span>Profile</span></a
                        >
                    </li>
                    <li>
                        <a
                            href="calendar.html"
                            class="flex flex-col items-center text-[10px] font-medium text-black"
                            ><svg

                                fill="none"
                                viewBox="0 0 24 24"

                                class="w-6 h-6 mb-1"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"
                                /></svg
                            ><span>Calendar</span></a
                        >
                    </li>
                    <li>
                        <a
                            href="settings.html"
                            class="flex flex-col items-center text-[10px] font-medium text-gray-400"
                            ><svg
                                xmlns="http://www.w3.org/2000/svg"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke-width="1.5"
                                stroke="currentColor"
                                class="w-6 h-6 mb-1"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.99l1.005.828c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"
                                /></svg
                            ><span>Settings</span></a
                        >
                    </li>
                </ul>
            </nav>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script>
            // 1. Core Config Rules Matrix Definition
            const AVAILABILITY_RULES = {
                FREE: {
                    colorClass: 'bg-[#bbcd84]',
                    score: 100,
                    defaultGrade: 'A+',
                },
                FREE_NO_SHOW: {
                    colorClass: 'bg-gray-300',
                    score: 50,
                    defaultGrade: 'C-',
                },
                NOT_AVAILABLE: {
                    colorClass: 'bg-[#f5c6c6]',
                    score: 0,
                    defaultGrade: 'F',
                },
            };

            // Step 2: Updated Dataset Schema with Times, Usernames, and Explicit Grades
            let backendActivitiesDataset = [
                {
                    day: 7,
                    user: 'Jeffery',
                    time: '8 AM to 3 PM',
                    title: 'In School',
                    type: 'NOT_AVAILABLE',
                    grade: 'F',
                },
                {
                    day: 8,
                    user: 'Jeffery',
                    time: '8 AM to 5 PM',
                    title: 'School Bound Shift',
                    type: 'NOT_AVAILABLE',
                    grade: 'F',
                },
                {
                    day: 9,
                    user: 'Jeffery',
                    time: '6 AM to 2 PM',
                    title: 'Core Locked Shift',
                    type: 'NOT_AVAILABLE',
                    grade: 'F',
                },
                {
                    day: 10,
                    user: 'Jeffery',
                    time: '9 AM to 4 PM',
                    title: 'Clinical Blocks',
                    type: 'NOT_AVAILABLE',
                    grade: 'F',
                },
                {
                    day: 11,
                    user: 'Jeffery',
                    time: '8 AM to 3 PM',
                    title: 'In School',
                    type: 'NOT_AVAILABLE',
                    grade: 'F',
                },
                {
                    day: 11,
                    user: 'Jeffery',
                    time: '3 PM to 9 PM',
                    title: 'Open Study Window',
                    type: 'FREE',
                    grade: 'A+',
                },
                {
                    day: 11,
                    user: 'Jeffery',
                    time: '9 PM to 11 PM',
                    title: 'No Show Window Check',
                    type: 'FREE_NO_SHOW',
                    grade: 'C-',
                },
            ];

            // 3. Dynamic Generation & Weighted Engine Handler
            function generateCalendarGrid() {
                const targetGrid = document.getElementById('calendar-grid');
                targetGrid.innerHTML = ''; // Flush previous DOM nodes

                // Render July offset space (July 2026 starts on Wednesday = 3 empty cells)
                for (let i = 0; i < 3; i++) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'h-10';
                    targetGrid.appendChild(emptyCell);
                }

                // Loop over total calendar month spectrum (31 Days)
                for (let day = 1; day <= 31; day++) {
                    const dayEvents = backendActivitiesDataset.filter(
                        (item) => item.day === day,
                    );

                    let targetColorClass = 'hover:bg-gray-50';
                    let innerTemplateString = `${day}`;

                    if (dayEvents.length > 0) {
                        // Math calculation step evaluating day aggregate weights
                        let aggregateScoreSum = 0;
                        dayEvents.forEach((e) => {
                            aggregateScoreSum +=
                                AVAILABILITY_RULES[e.type]?.score || 0;
                        });
                        const combinedAverage =
                            aggregateScoreSum / dayEvents.length;

                        // Assign style attributes corresponding to computed score brackets
                        let matchedRule = AVAILABILITY_RULES.NOT_AVAILABLE;
                        if (combinedAverage >= 85) {
                            matchedRule = AVAILABILITY_RULES.FREE;
                        } else if (combinedAverage >= 40) {
                            matchedRule = AVAILABILITY_RULES.FREE_NO_SHOW;
                        }

                        targetColorClass = `${matchedRule.colorClass} hover:opacity-90`;

                        // Retain your custom highlight focus circle style for day 9
                        if (day === 9) {
                            innerTemplateString = `
                               <div class="bg-[#8b5a5a] text-white w-[34px] h-[34px] rounded-lg flex items-center justify-center mx-auto">
                                   9
                               </div>`;
                        }
                    }

                    // Render node out to string template link layout
                    const anchorItem = document.createElement('a');

                    // Step 3: Changed Day Click Event Behavior (Enabling internal dynamic routing instead of file navigation)
                    anchorItem.href = 'javascript:void(0);';
                    anchorItem.setAttribute('onclick', `selectDay(${day})`);

                    anchorItem.className = `${targetColorClass} h-10 flex items-center justify-center transition-all cursor-pointer select-none rounded-[4px]`;
                    anchorItem.innerHTML = innerTemplateString;

                    targetGrid.appendChild(anchorItem);
                }

                // Pad remaining grid squares for overflow display visibility (4 trailing gray squares)
                for (let extra = 1; extra <= 4; extra++) {
                    const trailingCell = document.createElement('div');
                    trailingCell.className =
                        'h-10 flex items-center justify-center text-gray-300 font-light select-none';
                    trailingCell.innerText = extra;
                    targetGrid.appendChild(trailingCell);
                }
            }

            // Step 4: Add Interactive View Function to Render Target Day Details
            function selectDay(day) {
                const container = document.getElementById(
                    'day-details-container',
                );
                const heading = document.getElementById('selected-day-heading');
                const list = document.getElementById('day-activities-list');

                // Filter down matching items for clicked date row
                const dayEvents = backendActivitiesDataset.filter(
                    (item) => item.day === day,
                );

                heading.innerText = `July ${day}th, 2026 Schedule`;
                list.innerHTML = '';
                container.classList.remove('hidden');

                if (dayEvents.length === 0) {
                    list.innerHTML = `<p class="text-xs text-gray-400 italic">No scheduled activities logged for this day yet.</p>`;
                    return;
                }

                // Loop and build out the timeline interface elements matching your specs
                dayEvents.forEach((ev) => {
                    const rule = AVAILABILITY_RULES[ev.type] || {
                        colorClass: 'bg-gray-200',
                        defaultGrade: 'N/A',
                    };
                    const displayGrade = ev.grade || rule.defaultGrade;

                    const row = document.createElement('div');
                    row.className =
                        'flex items-center justify-between border-b border-gray-100 pb-3 last:border-0';
                    row.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-4 h-10 ${rule.colorClass} rounded-sm shrink-0"></div>
                            <div>
                                <div class="text-sm font-medium text-gray-900">${ev.title}</div>
                                <div class="text-xs text-gray-500">${ev.user}, ${ev.time}</div>
                            </div>
                        </div>
                        <div class="text-xs font-semibold px-2 py-1 bg-gray-100 rounded text-gray-700">
                            ⇧${displayGrade}
                        </div>
                    `;
                    list.appendChild(row);
                });
            }

            // 5. Input Controller action linking user form context to UI engine
            function addUserEvent() {
                const dayInput = document.getElementById('form-day').value;
                const statusInput =
                    document.getElementById('form-status').value;
                const titleInput = document.getElementById('form-title').value;

                if (!dayInput || dayInput < 1 || dayInput > 31) {
                    alert('Please specify a valid calendar day string (1-31).');
                    return;
                }

                // Step 5: Adjust Form Submissions to Support Usernames, Flexible Times, & Default Grades
                backendActivitiesDataset.push({
                    day: parseInt(dayInput),
                    user: 'Jeffery',
                    time: 'Flexible Hours',
                    title: titleInput || 'Scheduled Activity Entry',
                    type: statusInput,
                    grade:
                        AVAILABILITY_RULES[statusInput]?.defaultGrade || 'A+',
                });

                // Re-trigger render processing pipeline to dynamically apply calculation engine changes
                generateCalendarGrid();

                // Keep view updated if user modifies currently selected frame
                selectDay(parseInt(dayInput));

                // Reset form fields
                document.getElementById('form-day').value = '';
                document.getElementById('form-title').value = '';
            }

            // Fire engine render pass when page initialization finishes loading
            window.addEventListener('DOMContentLoaded', generateCalendarGrid);
        </script>
    </body>
</html>
