<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <title>Notifications Hub</title>
    </head>
    <body class="p-6 bg-gray-100 min-h-screen font-sans relative">
        <div class="flex justify-between items-center mb-6">
            <a
                href="index.html"
                class="inline-block bg-[#2E2E2E] hover:bg-black transition text-white px-5 py-2 rounded-lg text-sm font-medium shadow-sm"
            >
                Back
            </a>
            <button
                onclick="toggleDevTools()"
                class="bg-blue-600 hover:bg-blue-700 transition text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm cursor-pointer"
            >
                ⚙️ Developer Tools
            </button>
        </div>

        <div
            id="dev-tools-panel"
            class="hidden bg-white border border-gray-300 shadow-xl rounded-xl p-5 mb-6 max-w-md ml-auto flex flex-col gap-4"
        >
            <h3 class="text-lg font-bold text-gray-800 border-b pb-2">
                Developer Tool Menu
            </h3>
            <div>
                <label
                    class="block text-xs font-bold uppercase text-gray-500 mb-1"
                    >Inviter Name</label
                >
                <input
                    type="text"
                    id="dev-name"
                    value="Bob"
                    class="w-full border border-gray-300 p-2 rounded-lg text-sm outline-none"
                />
            </div>
            <div>
                <label
                    class="block text-xs font-bold uppercase text-gray-500 mb-1"
                    >Hangout Date</label
                >
                <input
                    type="text"
                    id="dev-date"
                    value="tomorrow"
                    class="w-full border border-gray-300 p-2 rounded-lg text-sm outline-none"
                />
            </div>
            <div>
                <label
                    class="block text-xs font-bold uppercase text-gray-500 mb-1"
                    >Streak Number</label
                >
                <input
                    type="number"
                    id="dev-streak"
                    value="12"
                    min="0"
                    class="w-full border border-gray-300 p-2 rounded-lg text-sm outline-none"
                />
            </div>
            <button
                onclick="inviteUser()"
                class="w-full bg-black hover:bg-gray-800 text-white font-bold py-2.5 rounded-lg text-sm transition cursor-pointer"
            >
                Invite User
            </button>
        </div>

        <div id="notification-zone" class="max-w-3xl mx-auto mt-8"></div>

        <script>
            // Toggle Panel Visibility
            function toggleDevTools() {
                const panel = document.getElementById('dev-tools-panel');
                panel.classList.toggle('hidden');
            }

            // Color Tier Matrix
            function getStreakTheme(streak) {
                if (streak === 0)
                    return {
                        bg: '#9e9e9e',
                        text: '#ffffff',
                        btnText: 'text-gray-900',
                    };
                if (streak >= 1 && streak <= 25)
                    return {
                        bg: '#4caf50',
                        text: '#ffffff',
                        btnText: 'text-green-800',
                    };
                if (streak >= 26 && streak <= 40)
                    return {
                        bg: '#ffeb3b',
                        text: '#111111',
                        btnText: 'text-yellow-900',
                    };
                if (streak >= 41 && streak <= 50)
                    return {
                        bg: '#ff9800',
                        text: '#ffffff',
                        btnText: 'text-orange-900',
                    };
                if (streak >= 51 && streak <= 70)
                    return {
                        bg: '#f44336',
                        text: '#ffffff',
                        btnText: 'text-red-900',
                    };
                if (streak >= 71 && streak <= 100)
                    return {
                        bg: '#2196f3',
                        text: '#ffffff',
                        btnText: 'text-blue-900',
                    };
                return {
                    bg: '#9c27b0',
                    text: '#ffffff',
                    btnText: 'text-purple-900',
                }; // 101 to infinite
            }

            // Initialize state on render
            function loadNotificationCard() {
                const container = document.getElementById('notification-zone');
                const activeInvite = localStorage.getItem(
                    'active_hangout_invite',
                );

                if (!activeInvite) {
                    container.innerHTML = `
                    <div class="bg-gray-200 text-gray-500 rounded-xl p-8 text-center font-medium shadow-inner">
                        No active hangout invitations. Use developer tools above to generate one.
                    </div>`;
                    return;
                }

                // Look up what the current live chat streak value is right now
                const currentGlobalStreak =
                    parseInt(localStorage.getItem('global_user_streak')) || 0;
                const data = JSON.parse(activeInvite);
                const theme = getStreakTheme(currentGlobalStreak);

                container.innerHTML = `
                <div style="background-color: ${theme.bg}; color: ${theme.text}" class="rounded-xl p-6 shadow-md transition-all duration-300">
                    <h2 class="text-2xl font-bold tracking-tight mb-8">
                        “${data.name}” invites you to hangout (${data.date}).
                    </h2>
                    
                    <div class="flex flex-wrap justify-between items-center gap-4 pt-4 border-t border-black/10">
                        <div class="flex items-center gap-3">
                            <button onclick="dismissNotification()" class="px-5 py-2 font-bold rounded-lg hover:bg-black/10 transition cursor-pointer text-lg">
                                Ignore
                            </button>
                            <button onclick="triggerLossStreak()" class="bg-white/95 hover:bg-white px-4 py-2 font-bold rounded-lg ${theme.btnText} transition shadow-sm flex items-center gap-1 text-base cursor-pointer">
                                Loss Streak 
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" /></svg>
                            </button>
                        </div>

                        <div class="flex items-center gap-3">
                            <button onclick="dismissNotification()" class="px-5 py-2 font-bold rounded-lg hover:bg-white/20 transition cursor-pointer text-lg">
                                Accept
                            </button>
                            <button onclick="triggerAddStreak()" class="bg-white/95 hover:bg-white px-4 py-2 font-bold rounded-lg ${theme.btnText} transition shadow-sm flex items-center gap-1 text-base cursor-pointer">
                                Add Streak
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" /></svg>
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }

            // Action Trigger logic
            function inviteUser() {
                const name =
                    document.getElementById('dev-name').value.trim() || 'Bob';
                const date =
                    document.getElementById('dev-date').value.trim() ||
                    'tomorrow';
                const streak =
                    parseInt(document.getElementById('dev-streak').value) || 0;

                const inviteObject = { name, date, streak };
                localStorage.setItem(
                    'active_hangout_invite',
                    JSON.stringify(inviteObject),
                );

                // FIXED: Removed the direct localStorage overwrite of 'global_user_streak' here
                // so it respects whatever value is currently running inside chat.html instead!

                loadNotificationCard();
            }

            // Pulls active value and adds EXACTLY 1 point
            function triggerAddStreak() {
                let currentStreak =
                    parseInt(localStorage.getItem('global_user_streak')) || 0;
                currentStreak += 1;

                localStorage.setItem('global_user_streak', currentStreak);
                dismissNotification();
            }

            // Instantly forces current value to 0
            function triggerLossStreak() {
                localStorage.setItem('global_user_streak', 0);
                dismissNotification();
            }

            function dismissNotification() {
                localStorage.removeItem('active_hangout_invite');
                loadNotificationCard();
            }

            // Load content on page initialization
            window.onload = loadNotificationCard;
        </script>
    </body>
</html>
