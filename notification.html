<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body>
    <div class="flex flex-col gap-6 font-sans">
          <a href="index.html" class="bg-[#2E2E2E] hover:bg-black transition text-white px-5 py-2 rounded-lg text-sm font-medium z-10 shadow-sm">
            Back
        </a>
  <!-- Notification Card 1 -->
  <div class="bg-gray-300 rounded-xl p-5">
    <h2 class="text-xl font-bold text-black mb-8 tracking-tight">Bob invites you to hangout</h2>
    <div class="flex justify-end gap-5">
      <button class="text-xl font-bold text-black hover:opacity-70 transition-opacity">Accept</button>
      <button class="text-xl font-bold text-black hover:opacity-70 transition-opacity">Ignore</button>
    </div>
  </div>

  <!-- Notification Card 2 -->
  <div class="bg-gray-300 rounded-xl p-5">
    <h2 class="text-xl font-bold text-black mb-8 tracking-tight">You have hangout tomorrow</h2>
    <div class="flex justify-end">
      <button class="flex items-center gap-2 text-xl font-bold text-black hover:opacity-70 transition-opacity">
        View
        <!-- Right Arrow Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
        </svg>
      </button>
    </div>
  </div>

</div>
</body>
</html>
