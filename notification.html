<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <title>Notifications Hub</title>
    </head>
    <body class="p-6 bg-gray-100 min-h-screen font-sans relative">
        <div class="flex justify-between items-center mb-6">
            <a
                href="calendar.html"
                class="inline-block bg-[#2E2E2E] hover:bg-black transition text-white px-5 py-2 rounded-lg text-sm font-medium shadow-sm"
            >
                Back to Calendar
            </a>
            <button
                onclick="toggleDevTools()"
                class="bg-blue-600 hover:bg-blue-700 transition text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm cursor-pointer"
            >
                ⚙️ Developer Tools
            </button>
        </div>

        <div
            id="dev-tools-panel"
            class="hidden bg-white border border-gray-300 shadow-xl rounded-xl p-5 mb-6 max-w-md ml-auto flex flex-col gap-4"
        >
            <h3 class="text-lg font-bold text-gray-800 border-b pb-2">
                Developer Tool Menu
            </h3>
            <div>
                <label
                    class="block text-xs font-bold uppercase text-gray-500 mb-1"
                    >Inviter Name</label
                >
                <input
                    type="text"
                    id="dev-name"
                    value="Bob"
                    class="w-full border border-gray-300 p-2 rounded-lg text-sm outline-none"
                />
            </div>
            <div>
                <label
                    class="block text-xs font-bold uppercase text-gray-500 mb-1"
                    >Hangout Date Text Banner</label
                >
                <input
                    type="text"
                    id="dev-date"
                    value="tomorrow"
                    class="w-full border border-gray-300 p-2 rounded-lg text-sm outline-none"
                />
            </div>
            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label
                        class="block text-[10px] font-bold uppercase text-gray-400 mb-1"
                        >Target Day</label
                    >
                    <input
                        type="number"
                        id="dev-target-day"
                        value="14"
                        min="1"
                        max="31"
                        class="w-full border border-gray-300 p-1.5 rounded-lg text-xs outline-none"
                    />
                </div>
                <div>
                    <label
                        class="block text-[10px] font-bold uppercase text-gray-400 mb-1"
                        >Target Month</label
                    >
                    <select
                        id="dev-target-month"
                        class="w-full border border-gray-300 p-1.5 rounded-lg text-xs outline-none bg-white"
                    ></select>
                </div>
                <div>
                    <label
                        class="block text-[10px] font-bold uppercase text-gray-400 mb-1"
                        >Target Year</label
                    >
                    <input
                        type="number"
                        id="dev-target-year"
                        value="2026"
                        class="w-full border border-gray-300 p-1.5 rounded-lg text-xs outline-none"
                    />
                </div>
            </div>
            <div>
                <label
                    class="block text-xs font-bold uppercase text-gray-500 mb-1"
                    >Streak Number</label
                >
                <input
                    type="number"
                    id="dev-streak"
                    value="12"
                    min="0"
                    class="w-full border border-gray-300 p-2 rounded-lg text-sm outline-none"
                />
            </div>
            <button
                onclick="inviteUser()"
                class="w-full bg-black hover:bg-gray-800 text-white font-bold py-2.5 rounded-lg text-sm transition cursor-pointer"
            >
                Invite User
            </button>
        </div>

        <div id="notification-zone" class="max-w-3xl mx-auto mt-8"></div>

        <script>
            const MONTH_LABELS = [
                'Jan',
                'Feb',
                'Mar',
                'Apr',
                'May',
                'Jun',
                'Jul',
                'Aug',
                'Sep',
                'Oct',
                'Nov',
                'Dec',
            ];

            function initDevToolsDateDefaults() {
                const now = new Date();
                const monthSelect = document.getElementById('dev-target-month');

                // Build options for all 12 months dynamically
                monthSelect.innerHTML = '';
                MONTH_LABELS.forEach((label, index) => {
                    const opt = document.createElement('option');
                    opt.value = index;
                    opt.innerText = label;
                    if (index === now.getMonth()) {
                        opt.selected = true;
                    }
                    monthSelect.appendChild(opt);
                });

                // Pre-populate input configurations with live system dates
                document.getElementById('dev-target-day').value = now.getDate();
                document.getElementById('dev-target-year').value =
                    now.getFullYear();
            }

            function toggleDevTools() {
                const panel = document.getElementById('dev-tools-panel');
                panel.classList.toggle('hidden');
            }

            function getStreakTheme(streak) {
                if (streak === 0)
                    return {
                        bg: '#9e9e9e',
                        text: '#ffffff',
                        btnText: 'text-gray-900',
                    };
                if (streak >= 1 && streak <= 25)
                    return {
                        bg: '#4caf50',
                        text: '#ffffff',
                        btnText: 'text-green-800',
                    };
                if (streak >= 26 && streak <= 40)
                    return {
                        bg: '#ffeb3b',
                        text: '#111111',
                        btnText: 'text-yellow-900',
                    };
                if (streak >= 41 && streak <= 50)
                    return {
                        bg: '#ff9800',
                        text: '#ffffff',
                        btnText: 'text-orange-900',
                    };
                if (streak >= 51 && streak <= 70)
                    return {
                        bg: '#f44336',
                        text: '#ffffff',
                        btnText: 'text-red-900',
                    };
                if (streak >= 71 && streak <= 100)
                    return {
                        bg: '#2196f3',
                        text: '#ffffff',
                        btnText: 'text-blue-900',
                    };
                return {
                    bg: '#9c27b0',
                    text: '#ffffff',
                    btnText: 'text-purple-900',
                };
            }

            function loadNotificationCard() {
                const container = document.getElementById('notification-zone');
                const activeInvite = localStorage.getItem(
                    'active_hangout_invite',
                );

                if (!activeInvite) {
                    container.innerHTML = `
                    <div class="bg-gray-200 text-gray-500 rounded-xl p-8 text-center font-medium shadow-inner">
                        No active hangout invitations. Use developer tools above to generate one.
                    </div>`;
                    return;
                }

                const currentGlobalStreak =
                    parseInt(localStorage.getItem('global_user_streak')) || 0;
                const data = JSON.parse(activeInvite);
                const theme = getStreakTheme(currentGlobalStreak);

                container.innerHTML = `
                <div style="background-color: ${theme.bg}; color: ${theme.text}" class="rounded-xl p-6 shadow-md transition-all duration-300">
                    <h2 class="text-2xl font-bold tracking-tight mb-8">
                        “${data.name}” invites you to hangout (${data.date}).
                    </h2>
                    
                    <div class="flex flex-wrap justify-between items-center gap-4 pt-4 border-t border-black/10">
                        <div class="flex items-center gap-3">
                            <button onclick="dismissNotification()" class="px-5 py-2 font-bold rounded-lg hover:bg-black/10 transition cursor-pointer text-lg">
                                Ignore
                            </button>
                            <button onclick="triggerLossStreak()" class="bg-white/95 hover:bg-white px-4 py-2 font-bold rounded-lg ${theme.btnText} transition shadow-sm flex items-center gap-1 text-base cursor-pointer">
                                Loss Streak 
                            </button>
                        </div>

                        <div class="flex items-center gap-3">
                            <button onclick="acceptHangout()" class="px-5 py-2 font-bold bg-white/20 hover:bg-white/30 transition rounded-lg cursor-pointer text-lg">
                                Accept
                            </button>
                            <button onclick="triggerAddStreak()" class="bg-white/95 hover:bg-white px-4 py-2 font-bold rounded-lg ${theme.btnText} transition shadow-sm flex items-center gap-1 text-base cursor-pointer">
                                Add Streak
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }

            function inviteUser() {
                const name =
                    document.getElementById('dev-name').value.trim() || 'Bob';
                const dateText =
                    document.getElementById('dev-date').value.trim() ||
                    'tomorrow';

                let targetDay = parseInt(
                    document.getElementById('dev-target-day').value,
                );
                let targetMonth = parseInt(
                    document.getElementById('dev-target-month').value,
                );
                let targetYear = parseInt(
                    document.getElementById('dev-target-year').value,
                );

                // Handle string macro transformation dynamically relative to today's date
                if (dateText.toLowerCase() === 'tomorrow') {
                    const tomorrowsDate = new Date();
                    tomorrowsDate.setDate(tomorrowsDate.getDate() + 1);

                    // Only apply auto-override if form inputs haven't been manually adjusted away from current day presets
                    const checkDay = new Date();
                    if (targetDay === checkDay.getDate()) {
                        targetDay = tomorrowsDate.getDate();
                        targetMonth = tomorrowsDate.getMonth();
                        targetYear = tomorrowsDate.getFullYear();
                    }
                }

                const inviteObject = {
                    name,
                    date: dateText,
                    hangoutDay: targetDay,
                    hangoutMonth: targetMonth,
                    hangoutYear: targetYear,
                };

                localStorage.setItem(
                    'active_hangout_invite',
                    JSON.stringify(inviteObject),
                );
                loadNotificationCard();
            }

            function processCalendarInjection() {
                const activeInvite = localStorage.getItem(
                    'active_hangout_invite',
                );
                if (!activeInvite) return;
                const data = JSON.parse(activeInvite);

                const newEvent = {
                    year: data.hangoutYear,
                    month: data.hangoutMonth,
                    day: data.hangoutDay,
                    user: data.name,
                    time: 'Confirmed Hangout Window',
                    title: `✨ Special Hangout with ${data.name}`,
                    type: 'HANGOUT',
                    grade: 'VIP',
                };

                let currentDatabase =
                    JSON.parse(localStorage.getItem('calendarActivities')) ||
                    [];

                // Clear any duplicate hangout tags for this day to prevent entry stacking
                currentDatabase = currentDatabase.filter(
                    (ev) =>
                        !(
                            ev.year === newEvent.year &&
                            ev.month === newEvent.month &&
                            ev.day === newEvent.day &&
                            ev.type === 'HANGOUT'
                        ),
                );

                currentDatabase.push(newEvent);
                localStorage.setItem(
                    'calendarActivities',
                    JSON.stringify(currentDatabase),
                );
            }

            function acceptHangout() {
                processCalendarInjection();
                dismissNotification();
            }

            function triggerAddStreak() {
                let currentStreak =
                    parseInt(localStorage.getItem('global_user_streak')) || 0;
                currentStreak += 1;
                localStorage.setItem('global_user_streak', currentStreak);
                processCalendarInjection();
                dismissNotification();
            }

            function triggerLossStreak() {
                localStorage.setItem('global_user_streak', 0);
                dismissNotification();
            }

            function dismissNotification() {
                localStorage.removeItem('active_hangout_invite');
                loadNotificationCard();
            }

            window.onload = function () {
                initDevToolsDateDefaults();
                loadNotificationCard();
            };
        </script>
    </body>
</html>
