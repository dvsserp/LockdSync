<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body class="bg-white min-h-screen flex flex-col">

    <!-- Header -->
    <header class="relative flex items-center px-4 md:px-8 py-4 border-b border-black pt-8">
        <!-- Back Button -->
        <a href="index.html" class="bg-[#2E2E2E] hover:bg-black transition text-white px-5 py-2 rounded-lg text-sm font-medium z-10 shadow-sm">
            Back
        </a>
        
        <!-- Title (Absolutely positioned to stay perfectly centered) -->
        <h1 class="absolute left-0 right-0 text-center text-2xl font-bold text-black pointer-events-none">
            Hangout #
        </h1>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-md mx-auto px-6 pt-12 space-y-6 flex-1">
        
        <!-- Schedule Button -->
        <a href="schedule.html" class="block w-full bg-[#2E2E2E] hover:bg-black transition text-white text-2xl font-medium py-8 rounded-xl text-center shadow-md">
            Schedule
        </a>

        <!-- Message Button -->
        <a href="chat.html" class="block w-full bg-[#2E2E2E] hover:bg-black transition text-white text-2xl font-medium py-8 rounded-xl text-center shadow-md">
            Message
        </a>
        
    </main>

</body>
</html>
