        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Activities · LockdSync</title>
        <link rel="stylesheet" href="style.css">
        <!-- React (development) via CDN for quick integration -->

        <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <style>

            body { background: #fafafa }

</head>
<body>
    <header>
        <h1>LockdSync</h1>
    </header>

    <main class="container">
        <div id="root"></div>
    </main>

    <script type="text/babel">
        const { useState, useMemo } = React;

        function daysInMonth(year, month){
            return new Date(year, month+1, 0).getDate();
        }

        function CoreFeatures(){
            const today = new Date(2026,6,10); // align with screenshot date (July 10, 2026)
            const [viewYear, setViewYear] = useState(today.getFullYear());
            const [viewMonth, setViewMonth] = useState(today.getMonth());
            const [selected, setSelected] = useState(new Date(2026,6,9));

            // sample ranges matching screenshot
            const ranges = useMemo(()=>[
                { start: new Date(2026,6,7), end: new Date(2026,6,10), color: 'pink' },
                { start: new Date(2026,6,11), end: new Date(2026,6,11), color: 'green' }
            ],[]);

            const monthName = new Date(viewYear, viewMonth, 1).toLocaleString(undefined,{month:'short'});

            function prevMonth(){
                if(viewMonth === 0){ setViewMonth(11); setViewYear(v=>v-1); }
                else setViewMonth(m=>m-1);
            }
            function nextMonth(){
                if(viewMonth === 11){ setViewMonth(0); setViewYear(v=>v+1); }
                else setViewMonth(m=>m+1);
            }

            // build calendar matrix
            const firstDay = new Date(viewYear, viewMonth, 1).getDay();
            const totalDays = daysInMonth(viewYear, viewMonth);
            const weeks = [];
            let week = new Array(7).fill(null);
            let dayCounter = 1;
            // fill first week
            for(let i=0;i<7;i++){
                if(i >= firstDay){ week[i] = new Date(viewYear, viewMonth, dayCounter++); }
            }
            weeks.push(week);
            while(dayCounter <= totalDays){
                week = new Array(7).fill(null);
                for(let i=0;i<7 && dayCounter<=totalDays;i++){
                    week[i] = new Date(viewYear, viewMonth, dayCounter++);
                }
                weeks.push(week);
            }

            function inRange(d, range){
                if(!d) return false;
                return d >= range.start && d <= range.end;
            }

            return (
                <div style={{width:'100%'}}>
                    <h2 style={{color:'#9aa0a6', fontWeight:500}}>Calendar</h2>

                    <div className="calendar-card">
                        <div className="calendar-controls">
                            <button className="icon-btn" onClick={prevMonth}>&lt;</button>
                            <div className="selects">
                                <select value={viewMonth} onChange={e=>setViewMonth(Number(e.target.value))}>
                                    {Array.from({length:12}).map((_,i)=> <option key={i} value={i}>{new Date(2020,i,1).toLocaleString(undefined,{month:'short'})}</option>)}
                                </select>
                                <select value={viewYear} onChange={e=>setViewYear(Number(e.target.value))}>
                                    {Array.from({length:6}).map((_,i)=>{
                                        const y = 2024 + i; return <option key={y} value={y}>{y}</option>
                                    })}
                                </select>
                            </div>
                            <button className="icon-btn" onClick={nextMonth}>&gt;</button>
                        </div>

                        <div className="calendar-grid">
                            <div className="weekday">Su</div>
                            <div className="weekday">Mo</div>
                            <div className="weekday">Tu</div>
                            <div className="weekday">We</div>
                            <div className="weekday">Th</div>
                            <div className="weekday">Fr</div>
                            <div className="weekday">Sa</div>

                            {weeks.map((w,wi)=> w.map((d,di)=>{
                                const cls = [];
                                let style = {};
                                if(d){
                                    ranges.forEach(r=>{ if(inRange(d,r)) cls.push('range-'+r.color); });
                                    if(selected && d.toDateString() === selected.toDateString()) cls.push('selected');
                                } else cls.push('empty');

                                return (
                                    <div key={wi+'-'+di} className={"day "+cls.join(' ')} onClick={()=>d&&setSelected(d)}>
                                        {d? d.getDate(): ''}
                                    </div>
                                )
                            }))}
                        </div>
                    </div>

                    <div className="legend" style={{marginTop:24}}>
                        <div className="legend-item"><span className="swatch pink"></span><div>Jeffery, has Doctor appointment</div></div>
                        <div className="legend-item"><span className="swatch green"></span><div>Jeffery, &amp; OP, are available part of the day.</div></div>
                    </div>

                    <nav className="bottom-nav" aria-hidden>
                        <div className="nav-item">🏠<div className="nav-label">Home</div></div>
                        <div className="nav-item active">⭐<div className="nav-label">Activities</div></div>
                        <div className="nav-item">👤<div className="nav-label">Profile</div></div>
                        <div className="nav-item">📅<div className="nav-label">Calendar</div></div>
                        <div className="nav-item">⚙️<div className="nav-label">Settings</div></div>
                    </nav>
                </div>
            )
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<CoreFeatures />);
    </script>
