    <!-- Main Section Content -->

        <!-- Search Input Field -->

        </div>

        <!-- Activities List Block -->
        <div class="flex flex-col gap-6">
            
            <!-- Activity Item #1 -->
            <div class="bg-[#dadada] rounded p-6 grid grid-cols-2 grid-rows-[auto_auto] gap-y-12 min-h-[140px] transition-all duration-200 hover:-translate-y-[2px] hover:shadow-[0_4px_12px_rgba(0,0,0,0.05)]">
                <div class="col-start-1 row-start-1 text-[1.05rem] font-semibold text-black self-start">Activity #1</div>
                <div class="col-start-2 row-start-1 text-right text-base text-black self-start">Cost:</div>
                <div class="col-start-2 row-start-2 text-right text-base text-black self-end">Place:</div>

            <!-- Activity Item #2 -->
