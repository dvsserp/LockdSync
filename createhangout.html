<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <title>Create Hangout</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                font-family: 'Inter', sans-serif;
            }
        </style>
    </head>
    <body
        class="bg-gray-50 h-screen flex flex-col overflow-hidden text-gray-900"
    >
        <header
            class="flex justify-between items-center px-6 py-4 border-b border-gray-200 bg-white shrink-0"
        >
            <a
                href="index.html"
                class="text-gray-600 hover:text-black transition flex items-center"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="2"
                    stroke="currentColor"
                    class="w-6 h-6"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M15.75 19.5L8.25 12l7.5-7.5"
                    />
                </svg>
            </a>
            <h1 class="text-lg font-semibold text-black">New Hangout</h1>
            <div class="w-6"></div>
        </header>

        <main class="flex-1 px-5 py-8 overflow-y-auto bg-white">
            <form id="create-hangout-form" class="space-y-6">
                <div>
                    <label
                        for="hangout-name"
                        class="block text-sm font-medium text-gray-700 mb-2"
                        >Hangout Name</label
                    >
                    <input
                        type="text"
                        id="hangout-name"
                        required
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition"
                        placeholder="e.g. Dinner & Movie"
                    />
                </div>
                <div>
                    <label
                        for="hangout-price"
                        class="block text-sm font-medium text-gray-700 mb-2"
                        >Average Price ($)</label
                    >
                    <input
                        type="number"
                        id="hangout-price"
                        step="0.01"
                        required
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition"
                        placeholder="0.00"
                    />
                </div>
                <div>
                    <label
                        for="hangout-date"
                        class="block text-sm font-medium text-gray-700 mb-2"
                        >Date</label
                    >
                    <input
                        type="date"
                        id="hangout-date"
                        required
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition"
                    />
                </div>
                <button
                    type="submit"
                    id="submit-btn"
                    class="w-full bg-black text-white font-semibold rounded-xl py-4 mt-4 hover:bg-gray-800 transition shadow-md"
                >
                    Create Hangout
                </button>
                <p
                    id="form-error"
                    class="text-red-500 text-sm text-center hidden mt-2"
                ></p>
            </form>
        </main>

        <script>
            // Generator function for a completely unique Hangout Code (Format: XXX-XXX)
            function generateUniqueCode() {
                const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; // Clean set (no ambiguous O, I, 1, 0)
                let part1 = '';
                let part2 = '';
                for (let i = 0; i < 3; i++) {
                    part1 += chars.charAt(
                        Math.floor(Math.random() * chars.length),
                    );
                    part2 += chars.charAt(
                        Math.floor(Math.random() * chars.length),
                    );
                }
                return `${part1}-${part2}`;
            }

            document
                .getElementById('create-hangout-form')
                .addEventListener('submit', function (e) {
                    // Create a unique code upon creation form submission
                    const uniqueCode = generateUniqueCode();

                    // Save code dynamically so app.js can intercept it when creating the record in Supabase / Local storage
                    localStorage.setItem('pending_hangout_code', uniqueCode);
                    console.log(
                        'Generated unique code for new hangout: ',
                        uniqueCode,
                    );
                });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="app.js"></script>
    </body>
</html>
