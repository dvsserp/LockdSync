<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Add Activity</title>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden text-gray-900">
    
    <!-- Top Header -->
    <header class="flex justify-between items-center px-6 py-4 border-b border-gray-200 bg-white shrink-0">
        <a id="back-to-schedule-btn" href="schedule.html" class="text-gray-600 hover:text-black transition flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
            </svg>
        </a>
        <h1 class="text-lg font-semibold text-black">New Activity</h1>
        <div class="w-6"></div>
    </header>

    <!-- Main Content: Form -->
    <main class="flex-1 px-5 py-8 overflow-y-auto bg-white">
        <form id="create-activity-form" class="space-y-6">
            
            <div>
                <label for="act-time" class="block text-sm font-medium text-gray-700 mb-2">Time</label>
                <input type="time" id="act-time" required class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:border-black focus:ring-1 focus:ring-black transition">
            </div>

            <div>
                <label for="act-name" class="block text-sm font-medium text-gray-700 mb-2">Activity Name</label>
                <input type="text" id="act-name" required class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:border-black focus:ring-1 focus:ring-black transition" placeholder="e.g. Lunch">
            </div>
            
            <div>
                <label for="act-price" class="block text-sm font-medium text-gray-700 mb-2">Price ($)</label>
                <input type="number" id="act-price" step="0.01" required class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:border-black focus:ring-1 focus:ring-black transition" placeholder="0.00">
            </div>
            
            <div>
                <label for="act-location" class="block text-sm font-medium text-gray-700 mb-2">Location</label>
                <input type="text" id="act-location" required class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:border-black focus:ring-1 focus:ring-black transition" placeholder="e.g. McDonalds">
            </div>
            
            <button type="submit" id="submit-activity-btn" class="w-full bg-black text-white font-semibold rounded-xl py-4 mt-4 hover:bg-gray-800 transition shadow-md">
                Add to Schedule
            </button>
            <p id="act-form-error" class="text-red-500 text-sm text-center hidden mt-2"></p>
        </form>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
