<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>LockdSync - Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#fafafa] text-gray-900 antialiased min-h-screen flex flex-col">
    
    <!-- Navbar -->
    <nav class="w-full px-6 py-5 flex justify-between items-center max-w-5xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-[#2E2E2E] flex items-center justify-center shadow-sm">
               <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="white" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                </svg>
            </div>
            <span class="font-bold text-xl tracking-tight">LockdSync</span>
        </div>
        <a href="login.html" class="text-sm font-semibold text-black hover:text-gray-500 transition">Log In</a>
    </nav>

    <!-- Hero Section -->
    <main class="flex-1 flex flex-col items-center justify-center text-center px-6 mt-10 mb-24 max-w-3xl mx-auto w-full">
        <div class="inline-block px-3 py-1.5 mb-6 rounded-full bg-white border border-gray-200 text-xs font-bold text-gray-800 tracking-wider shadow-sm">
            COMING SOON
        </div>
        
        <h1 class="text-4xl md:text-6xl font-bold tracking-tight text-black mb-6 leading-tight">
            Never miss a hangout. <br> Sync up with your circle.
        </h1>
        
        <p class="text-lg md:text-xl text-gray-500 mb-10 max-w-xl mx-auto">
            LockdSync keeps your friend group on the same page. Propose hangouts, split costs, and build a shared calendar without the group chat chaos.
        </p>

        <!-- Waitlist Form -->
        <form id="waitlist-form" class="w-full max-w-md flex flex-col sm:flex-row gap-3 mx-auto">
            <input id="waitlist-email" type="email" placeholder="Enter your email address" required class="flex-1 border border-gray-300 rounded-xl px-4 py-3.5 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition shadow-sm text-sm" />
            <button type="submit" id="waitlist-btn" class="bg-[#2E2E2E] hover:bg-black transition text-white rounded-xl px-6 py-3.5 text-sm font-semibold shadow-sm whitespace-nowrap">
                Join Waitlist
            </button>
        </form>
        
        <p id="waitlist-msg" class="mt-5 text-sm font-medium hidden"></p>
    </main>

    <!-- Footer -->
    <footer class="w-full text-center py-6 border-t border-gray-200 text-xs text-gray-400">
        &copy; 2026 LockdSync. All rights reserved.
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const waitlistForm = document.getElementById('waitlist-form');
        const waitlistBtn = document.getElementById('waitlist-btn');
        const waitlistMsg = document.getElementById('waitlist-msg');
        const emailInput = document.getElementById('waitlist-email');

        waitlistForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            waitlistBtn.textContent = 'Joining...';
            waitlistBtn.disabled = true;
            waitlistMsg.classList.add('hidden');

            const email = emailInput.value.trim();

            // Insert directly into the waitlist table (Bypasses Auth limits!)
            const { error } = await supabase.from('waitlist').insert([{ email: email }]);

            if (error) {
                console.error('Waitlist error:', error);
                waitlistMsg.textContent = 'Something went wrong. Please try again.';
                waitlistMsg.className = 'mt-5 text-sm font-medium text-red-600 block';
                waitlistBtn.textContent = 'Join Waitlist';
                waitlistBtn.disabled = false;
            } else {
                waitlistMsg.textContent = 'You are on the list! We will be in touch soon.';
                waitlistMsg.className = 'mt-5 text-sm font-medium text-green-600 block';
                waitlistBtn.textContent = 'Joined!';
                emailInput.value = '';
            }
        });
    </script>
</body>
</html>
